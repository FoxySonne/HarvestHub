<section class="page-section">

  <h1>Турбочерепашка & VS Дуэль союза</h1>

  <label for="daySelector">День недели:</label>
  <select id="daySelector" data-no-persist="true"></select>

  <div class="turbo-content" data-active-event="turtle">

    <div class="turbo-mobile-switch" role="tablist" aria-label="Переключатель события">
      <button type="button" class="is-active" data-turbo-mobile-tab="turtle" role="tab" aria-selected="true">Черепашка</button>
      <button type="button" data-turbo-mobile-tab="vs" role="tab" aria-selected="false">VS</button>
    </div>

    <section class="card turbo-card results desktop-fixed-right turbo-summary-card">
      <div class="card-header">
        <h3>Цели и итоги</h3>
      </div>

      <details class="turbo-summary-section" open>
        <summary class="turbo-summary-toggle">Цель на день</summary>

        <div class="turbo-summary-body">
          <div class="turbo-goal-input-grid">
            <label class="turbo-goal-field">
              <span>Цель Черепашки</span>
              <input id="turtleGoalPoints" type="text" inputmode="decimal" placeholder="15M или 15000000" autocomplete="off" data-no-persist="true">
            </label>

            <label class="turbo-goal-field">
              <span>Цель VS</span>
              <input id="vsGoalPoints" type="text" inputmode="decimal" placeholder="5M или 5000000" autocomplete="off" data-no-persist="true">
            </label>
          </div>

          <div class="turbo-goal-stats">
            <div>
              <span>Осталось Черепашки</span>
              <strong id="turtleGoalMissing">0</strong>
            </div>
            <div>
              <span>Осталось VS</span>
              <strong id="vsGoalMissing">0</strong>
            </div>
          </div>
        </div>
      </details>

      <details class="turbo-summary-section" open>
        <summary class="turbo-summary-toggle">Итоги</summary>

        <div class="turbo-summary-body">
          <div class="result-block">
            <h4>Всего Турбочерепашка:</h4>
            <div id="turtleTotal">0</div>
          </div>

          <div class="result-block">
            <h4>Всего VS Дуэль союза:</h4>
            <div id="vsTotal">0</div>
          </div>
        </div>
      </details>
    </section>

    <section class="card turbo-card" data-turbo-panel="turtle">
      <div class="card-header">
        <h3>Черепашка</h3>
      </div>

      <div id="turtleList" class="action-list"></div>
    </section>

    <section class="card turbo-card" data-turbo-panel="vs">
      <div class="card-header">
        <h3>Дуэль союза</h3>
      </div>

      <div id="vsList" class="action-list"></div>
    </section>

  </div>

</section>
